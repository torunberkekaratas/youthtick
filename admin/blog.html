<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Blog & News — YouthTICK Admin</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-layout">

  <main class="admin-main">
    <header class="admin-header">
      <div>
        <div class="admin-header-title">Blog & News</div>
        <div class="admin-header-subtitle">Create, edit and publish content across all languages</div>
      </div>
      <div class="admin-header-actions">
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="search-input" placeholder="Search posts…" oninput="renderPostList()"/>
        </div>
        <select class="form-select" id="filter-status" onchange="renderPostList()" style="width:130px;padding:7px 12px;">
          <option value="">All Status</option>
          <option value="published">Published</option>
          <option value="draft">Draft</option>
          <option value="scheduled">Scheduled</option>
        </select>
        <button class="btn btn-primary" onclick="openEditor()">
          <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Post
        </button>
      </div>
    </header>

    <div class="admin-content">

      <!-- Post list -->
      <div class="card" id="post-list-card" style="margin-bottom:20px;">
        <div class="card-header">
          <div class="card-title">
            <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Posts
          </div>
          <span id="post-count" class="badge badge-grey">0 posts</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Language</th>
                <th>Status</th>
                <th>Date</th>
                <th style="text-align:right;">Actions</th>
              </tr>
            </thead>
            <tbody id="post-table-body"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

</div>

<!-- ── EDITOR MODAL ──────────────────────────────────────────── -->
<div class="modal-overlay" id="editor-modal">
  <div class="modal modal-xl" style="max-width:980px;">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Post</div>
      <button class="modal-close" onclick="Modal.close('editor-modal')">${ICON_X}</button>
    </div>
    <div class="modal-body" style="display:grid;grid-template-columns:1fr 280px;gap:24px;">

      <!-- Main editor -->
      <div>
        <div class="form-group">
          <label class="form-label">Post Title *</label>
          <input class="form-input" id="post-title" type="text" placeholder="Enter compelling title…" style="font-size:16px;font-weight:600;"/>
        </div>
        <div class="form-group">
          <label class="form-label">Excerpt / Summary</label>
          <textarea class="form-textarea" id="post-excerpt" placeholder="Short description for preview cards and SEO…" rows="2"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:4px;">
          <label class="form-label">Content</label>
          <div class="rte-toolbar" id="rte-toolbar">
            <button class="rte-btn" title="Bold" onclick="rte('bold')"><b>B</b></button>
            <button class="rte-btn" title="Italic" onclick="rte('italic')"><i>I</i></button>
            <button class="rte-btn" title="Underline" onclick="rte('underline')"><u>U</u></button>
            <div class="rte-sep"></div>
            <button class="rte-btn" title="Heading 2" onclick="rte('formatBlock','h2')">H2</button>
            <button class="rte-btn" title="Heading 3" onclick="rte('formatBlock','h3')">H3</button>
            <button class="rte-btn" title="Paragraph" onclick="rte('formatBlock','p')">¶</button>
            <div class="rte-sep"></div>
            <button class="rte-btn" title="Bullet List" onclick="rte('insertUnorderedList')">
              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
            </button>
            <button class="rte-btn" title="Numbered List" onclick="rte('insertOrderedList')">
              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4" stroke-width="1.5"/><path d="M4 10H5" stroke-width="1.5"/><path d="M3 14h2c0 0 0 1-1 2s-1 2 1 2" stroke-width="1.5"/></svg>
            </button>
            <button class="rte-btn" title="Blockquote" onclick="rte('formatBlock','blockquote')">
              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
            </button>
            <div class="rte-sep"></div>
            <button class="rte-btn" title="Insert Link" onclick="insertLink()">
              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </button>
            <button class="rte-btn" title="Remove formatting" onclick="rte('removeFormat')" style="font-size:9px;width:auto;padding:0 6px;">Tx</button>
          </div>
          <div class="rte-content" id="rte-content" contenteditable="true" data-placeholder="Start writing…"></div>
        </div>

        <!-- SEO -->
        <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border-soft);">
          <div style="font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink-ghost);margin-bottom:14px;">SEO Settings</div>
          <div class="form-group">
            <label class="form-label">Meta Title</label>
            <input class="form-input" id="post-seo-title" type="text" placeholder="SEO title (defaults to post title)…"/>
          </div>
          <div class="form-group">
            <label class="form-label">Meta Description</label>
            <textarea class="form-textarea" id="post-seo-desc" placeholder="150–160 characters…" rows="2"></textarea>
          </div>
        </div>
      </div>

      <!-- Sidebar settings -->
      <div style="display:flex;flex-direction:column;gap:14px;">

        <div class="card">
          <div class="card-header" style="padding:12px 14px;"><div class="card-title" style="font-size:12px;">Publish Settings</div></div>
          <div class="card-body" style="padding:14px;">
            <div class="form-group mb-0">
              <label class="form-label">Status</label>
              <select class="form-select" id="post-status">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
                <option value="scheduled">Scheduled</option>
              </select>
            </div>
            <div class="form-group" id="schedule-group" style="display:none;margin-top:12px;">
              <label class="form-label">Publish Date</label>
              <input class="form-input" type="datetime-local" id="post-schedule"/>
            </div>
            <div style="margin-top:12px;">
              <button class="btn btn-primary w-full" onclick="savePost('published')" style="justify-content:center;">
                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Publish
              </button>
              <button class="btn btn-secondary w-full" onclick="savePost()" style="justify-content:center;margin-top:6px;">Save Draft</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header" style="padding:12px 14px;"><div class="card-title" style="font-size:12px;">Categorization</div></div>
          <div class="card-body" style="padding:14px;">
            <div class="form-group">
              <label class="form-label">Category</label>
              <select class="form-select" id="post-category">
                <option value="insights">Insights</option>
                <option value="erasmus">Erasmus+</option>
                <option value="innovation">Innovation</option>
                <option value="sustainability">Sustainability</option>
                <option value="culture">Culture</option>
                <option value="ai-youth">AI & Youth</option>
                <option value="news">News</option>
                <option value="events">Events</option>
                <option value="announcements">Announcements</option>
              </select>
            </div>
            <div class="form-group mb-0">
              <label class="form-label">Language</label>
              <select class="form-select" id="post-lang">
                <option value="en">English</option>
                <option value="tr">Turkish</option>
                <option value="de">German</option>
                <option value="all">All Languages</option>
              </select>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header" style="padding:12px 14px;"><div class="card-title" style="font-size:12px;">Featured Image</div></div>
          <div class="card-body" style="padding:14px;">
            <div id="featured-img-preview" style="margin-bottom:10px;"></div>
            <input class="form-input" id="post-featured-img" type="url" placeholder="Image URL…"/>
            <button class="btn btn-secondary w-full" onclick="document.getElementById('post-featured-img').dispatchEvent(new Event('change'))" style="justify-content:center;margin-top:8px;font-size:12px;">Preview Image</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header" style="padding:12px 14px;"><div class="card-title" style="font-size:12px;">Tags</div></div>
          <div class="card-body" style="padding:14px;">
            <input class="form-input" id="post-tags" type="text" placeholder="youth, europe, erasmus…"/>
            <div class="form-hint">Comma-separated</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header" style="padding:12px 14px;"><div class="card-title" style="font-size:12px;">Options</div></div>
          <div class="card-body" style="padding:14px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
              <span style="font-size:12.5px;font-weight:600;">Featured Post</span>
              <label class="switch">
                <input type="checkbox" id="post-featured"/>
                <div class="switch-track"></div>
                <div class="switch-thumb"></div>
              </label>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="font-size:12.5px;font-weight:600;">Allow Comments</span>
              <label class="switch">
                <input type="checkbox" id="post-comments" checked/>
                <div class="switch-track"></div>
                <div class="switch-thumb"></div>
              </label>
            </div>
          </div>
        </div>

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('editor-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePost()">Save Post</button>
    </div>
  </div>
</div>

<script>
// Inline ICON_X for modal (since admin.js not loaded yet)
const ICON_X_SVG = `<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
</script>

<script src="store.js"></script>
<script src="auth.js"></script>
<script src="admin.js"></script>
<script>
const session = AUTH.requireAuth();
if (session) {
  renderSidebar(session, 'blog.html');
  // Fix modal close button
  document.querySelector('.modal-close').innerHTML = ICON.x;
  renderPostList();
  initScheduleToggle();

  // Open new post if ?new=1
  if (new URLSearchParams(location.search).get('new')) {
    setTimeout(() => openEditor(), 300);
  }
}

/* ── POST LIST ──────────────────────────────────────────────── */
function renderPostList() {
  const search   = document.getElementById('search-input').value.toLowerCase();
  const status   = document.getElementById('filter-status').value;
  let posts      = STORE.getAllPosts();

  if (search) posts = posts.filter(p => p.title.toLowerCase().includes(search) || p.excerpt?.toLowerCase().includes(search));
  if (status) posts = posts.filter(p => p.status === status);

  document.getElementById('post-count').textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('post-table-body');
  if (!posts.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">${ICON.blog}</div><div class="empty-state-title">No posts yet</div><div class="empty-state-desc">Create your first blog post.</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = posts.map(p => `
    <tr>
      <td style="max-width:300px;">
        <div style="font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${STORE.escapeHtml(p.title)}</div>
        ${p.featured ? '<span class="badge badge-purple" style="margin-top:3px;display:inline-flex;">Featured</span>' : ''}
      </td>
      <td><span class="badge badge-grey">${p.category || 'Uncategorized'}</span></td>
      <td><span class="badge badge-blue">${(p.lang || 'en').toUpperCase()}</span></td>
      <td><span class="badge ${statusBadge(p.status)}">${p.status}</span></td>
      <td style="white-space:nowrap;font-size:12px;color:var(--ink-ghost);">${STORE.formatDateShort(p.createdAt)}</td>
      <td style="text-align:right;white-space:nowrap;">
        <button class="btn btn-ghost btn-sm" onclick="openEditor('${p.id}')">${ICON.edit} Edit</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--red);" onclick="deletePost('${p.id}')">${ICON.trash}</button>
      </td>
    </tr>
  `).join('');
}

function statusBadge(s) {
  if (s === 'published') return 'badge-green';
  if (s === 'scheduled') return 'badge-blue';
  return 'badge-amber';
}

function deletePost(id) {
  if (!confirm('Delete this post permanently?')) return;
  STORE.deletePost(id);
  STORE.logActivity('blog', 'Deleted a blog post', session.name);
  renderPostList();
  Toast.success('Post deleted.');
}

/* ── EDITOR ─────────────────────────────────────────────────── */
let currentPost = null;

function openEditor(id = null) {
  currentPost = id ? STORE.getPost(id) : null;
  const isNew = !currentPost;

  document.getElementById('modal-title').textContent = isNew ? 'New Post' : 'Edit Post';
  document.getElementById('post-title').value        = currentPost?.title    || '';
  document.getElementById('post-excerpt').value      = currentPost?.excerpt  || '';
  document.getElementById('rte-content').innerHTML   = currentPost?.content  || '';
  document.getElementById('post-status').value       = currentPost?.status   || 'draft';
  document.getElementById('post-category').value     = currentPost?.category || 'insights';
  document.getElementById('post-lang').value         = currentPost?.lang     || 'en';
  document.getElementById('post-tags').value         = (currentPost?.tags || []).join(', ');
  document.getElementById('post-featured').checked   = currentPost?.featured || false;
  document.getElementById('post-comments').checked   = currentPost?.allowComments !== false;
  document.getElementById('post-featured-img').value = currentPost?.featuredImg || '';
  document.getElementById('post-seo-title').value    = currentPost?.seoTitle || '';
  document.getElementById('post-seo-desc').value     = currentPost?.seoDesc  || '';
  document.getElementById('post-schedule').value     = currentPost?.scheduledAt || '';

  updateFeaturedPreview();
  Modal.open('editor-modal');
}

function savePost(forceStatus = null) {
  const title = document.getElementById('post-title').value.trim();
  if (!title) { Toast.error('Post title is required.'); return; }

  const post = {
    id:           currentPost?.id || STORE.generatePostId(),
    title,
    excerpt:      document.getElementById('post-excerpt').value.trim(),
    content:      document.getElementById('rte-content').innerHTML,
    status:       forceStatus || document.getElementById('post-status').value,
    category:     document.getElementById('post-category').value,
    lang:         document.getElementById('post-lang').value,
    tags:         document.getElementById('post-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    featured:     document.getElementById('post-featured').checked,
    allowComments:document.getElementById('post-comments').checked,
    featuredImg:  document.getElementById('post-featured-img').value.trim(),
    seoTitle:     document.getElementById('post-seo-title').value.trim(),
    seoDesc:      document.getElementById('post-seo-desc').value.trim(),
    scheduledAt:  document.getElementById('post-schedule').value || null,
    createdAt:    currentPost?.createdAt || new Date().toISOString(),
    updatedAt:    new Date().toISOString(),
    author:       session.name,
  };

  STORE.savePost(post);
  STORE.logActivity('blog', `${currentPost ? 'Updated' : 'Created'} post: ${STORE.truncate(title, 40)}`, session.name);
  Modal.close('editor-modal');
  renderPostList();
  Toast.success(`Post ${post.status === 'published' ? 'published' : 'saved'} successfully.`);
}

/* ── RTE HELPERS ────────────────────────────────────────────── */
function rte(cmd, val = null) {
  document.getElementById('rte-content').focus();
  document.execCommand(cmd, false, val);
}
function insertLink() {
  const url = prompt('Enter URL:');
  if (url) rte('createLink', url);
}

/* ── SCHEDULE TOGGLE ────────────────────────────────────────── */
function initScheduleToggle() {
  document.getElementById('post-status').addEventListener('change', function() {
    document.getElementById('schedule-group').style.display = this.value === 'scheduled' ? 'block' : 'none';
  });
  document.getElementById('post-featured-img').addEventListener('change', updateFeaturedPreview);
  document.getElementById('post-featured-img').addEventListener('blur', updateFeaturedPreview);
}
function updateFeaturedPreview() {
  const url = document.getElementById('post-featured-img').value.trim();
  const el  = document.getElementById('featured-img-preview');
  el.innerHTML = url ? `<img src="${STORE.escapeHtml(url)}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" onerror="this.style.display='none'"/>` : '';
}
</script>
</body>
</html>
