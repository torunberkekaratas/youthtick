<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Content Editor — YouthTICK Admin</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-layout">

  <main class="admin-main">
    <header class="admin-header">
      <div>
        <div class="admin-header-title">Pages & Content</div>
        <div class="admin-header-subtitle">Edit all website sections across all languages</div>
      </div>
      <div class="admin-header-actions">
        <div class="lang-tabs" id="lang-tabs">
          <div class="lang-tab active" data-lang="en" onclick="switchLang('en')">EN</div>
          <div class="lang-tab" data-lang="tr" onclick="switchLang('tr')">TR</div>
          <div class="lang-tab" data-lang="de" onclick="switchLang('de')">DE</div>
        </div>
        <button class="btn btn-primary" onclick="saveSection()">
          <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save Changes
        </button>
      </div>
    </header>

    <div class="admin-content" style="display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start;">

      <!-- Section List -->
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-ghost);margin-bottom:10px;">SECTIONS</div>
        <div class="section-list" id="section-list">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Editor Panel -->
      <div>
        <div class="card" id="editor-card">
          <div class="card-header" id="editor-header">
            <div class="card-title" id="editor-title">
              <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Select a section to edit
            </div>
            <div id="lang-badge" style="display:none">
              <span class="badge badge-blue" id="current-lang-badge">EN</span>
            </div>
          </div>
          <div class="card-body" id="editor-body">
            <div class="empty-state">
              <div class="empty-state-icon">
                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </div>
              <div class="empty-state-title">Choose a section</div>
              <div class="empty-state-desc">Select any section from the left panel to start editing its content.</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="store.js"></script>
<script src="auth.js"></script>
<script src="admin.js"></script>

/* ── STATE ──────────────────────────────────────────────────── */
let currentLang    = 'en';
let currentSection = null;

/* ── INIT ───────────────────────────────────────────────────── */
function init() {
  renderSectionList();
}

function renderSectionList() {
  const list = document.getElementById('section-list');
  list.innerHTML = SECTIONS.map(s => `
    <div class="section-item ${currentSection?.id === s.id ? 'active' : ''}"
         onclick="selectSection('${s.id}')">
      <div class="section-item-icon">${ICON[s.icon] || ICON.content}</div>
      <div style="flex:1;">
        <div class="section-item-name">${s.label}</div>
        <div class="section-item-desc">${s.desc}</div>
      </div>
      <div class="section-item-arrow">${ICON.arrow}</div>
    </div>
  `).join('');
}

function switchLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
  document.getElementById('current-lang-badge').textContent = lang.toUpperCase();
  if (currentSection) renderEditor();
}

function selectSection(id) {
  currentSection = SECTIONS.find(s => s.id === id);
  document.querySelectorAll('.section-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.section-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(`'${id}'`)) el.classList.add('active');
  });
  document.getElementById('lang-badge').style.display = 'block';
  renderEditor();
}

function getFieldValue(key) {
  // Check admin overrides first, then fall back to a default hint
  if (key.startsWith('__')) return STORE.getContentKey(currentLang, key) || '';
  return STORE.getContentKey(currentLang, key) || '';
}

function renderEditor() {
  const s = currentSection;
  document.getElementById('editor-title').innerHTML = `${ICON.edit} ${s.label}`;

  const fields = s.fields.map(f => {
    const val = getFieldValue(f.key);
    const safeVal = STORE.escapeHtml(val);
    const hintHtml = f.hint ? `<div class="form-hint">${f.hint}</div>` : '';

    if (f.type === 'textarea') {
      return `
        <div class="form-group">
          <label class="form-label">${f.label}
            <span class="badge badge-grey" style="font-size:9px;font-weight:600;letter-spacing:0;">${f.key}</span>
          </label>
          <textarea class="form-textarea" data-key="${f.key}" rows="3">${safeVal}</textarea>
          ${hintHtml}
        </div>`;
    }
    if (f.type === 'image') {
      return `
        <div class="form-group">
          <label class="form-label">${f.label}</label>
          <div style="display:flex;gap:10px;align-items:flex-start;">
            <input class="form-input" type="url" data-key="${f.key}" value="${safeVal}" placeholder="https://…" style="flex:1;"/>
            ${val ? `<img src="${val}" style="width:64px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border);flex-shrink:0;" onerror="this.style.display='none'"/>` : ''}
          </div>
          ${hintHtml}
        </div>`;
    }
    // text
    return `
      <div class="form-group">
        <label class="form-label">${f.label}
          <span class="badge badge-grey" style="font-size:9px;font-weight:600;letter-spacing:0;">${f.key}</span>
        </label>
        <input class="form-input" type="text" data-key="${f.key}" value="${safeVal}"/>
        ${hintHtml}
      </div>`;
  }).join('');

  document.getElementById('editor-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border-soft);">
      <span class="badge badge-blue">${currentLang.toUpperCase()}</span>
      <span style="font-size:12px;color:var(--ink-faint);">Editing ${s.label} in ${currentLang === 'en' ? 'English' : currentLang === 'tr' ? 'Turkish' : 'German'}</span>
    </div>
    <form id="editor-form">${fields}</form>
    <div style="display:flex;gap:10px;margin-top:8px;padding-top:16px;border-top:1px solid var(--border-soft);">
      <button class="btn btn-primary" onclick="saveSection()">
        ${ICON.save} Save ${s.label}
      </button>
      <button class="btn btn-secondary" onclick="resetSection()">Reset to Default</button>
    </div>
  `;
}

function saveSection() {
  if (!currentSection) { Toast.warning('Please select a section first.'); return; }
  const form    = document.getElementById('editor-form');
  if (!form) return;
  const inputs  = form.querySelectorAll('[data-key]');
  const updates = {};
  inputs.forEach(input => {
    const key = input.dataset.key;
    updates[key] = input.value;
  });
  STORE.setContentBatch(currentLang, updates);
  STORE.logActivity('content', `Updated "${currentSection.label}" (${currentLang.toUpperCase()})`, session.name);
  Toast.success(`${currentSection.label} saved in ${currentLang.toUpperCase()}`);
}

function resetSection() {
  if (!currentSection) return;
  if (!confirm(`Reset all "${currentSection.label}" overrides for ${currentLang.toUpperCase()}? This will restore the default content for this language.`)) return;
  const content = STORE.getContent();
  if (content[currentLang]) {
    currentSection.fields.forEach(f => { delete content[currentLang][f.key]; });
    STORE.setContent(content);
  }
  renderEditor();
  Toast.info('Section reset to defaults.');
}
