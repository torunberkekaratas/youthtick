<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Page Not Found — YouthTICK</title>
  <meta name="robots" content="noindex"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
    .notfound-wrap {
      min-height: calc(100vh - var(--nav-h, 72px));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h, 72px) + 40px) 24px 80px;
      text-align: center;
    }
    .notfound-inner { max-width: 560px; }
    .notfound-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 400;
      line-height: 1;
      color: var(--border-soft);
      letter-spacing: -0.04em;
      user-select: none;
      margin-bottom: 8px;
    }
    .notfound-icon {
      font-size: 2.4rem;
      margin-bottom: 24px;
      display: block;
    }
    .notfound-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      color: var(--ink);
    }
    .notfound-desc {
      font-size: 1rem;
      color: var(--ink-muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .notfound-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .notfound-pages {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 48px;
      padding-top: 40px;
      border-top: 1px solid var(--border-soft);
    }
    .notfound-page-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      border: 1.5px solid var(--border-soft);
      border-radius: var(--radius-lg);
      text-decoration: none;
      transition: all .2s;
      color: var(--ink-faint);
      font-size: 0.82rem;
      font-weight: 600;
    }
    .notfound-page-link:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-soft);
      transform: translateY(-2px);
    }
    .notfound-page-link span.icon { font-size: 1.3rem; }
    @media (max-width: 480px) {
      .notfound-pages { grid-template-columns: repeat(2, 1fr); }
      .notfound-links { flex-direction: column; align-items: center; }
      .notfound-links .btn { width: 100%; justify-content: center; min-height: 48px; }
    }
  </style>
</head>
<body>
<script>document.addEventListener('DOMContentLoaded',()=>{ if(window.lucide)lucide.createIcons(); setTimeout(()=>{if(window.lucide)lucide.createIcons();},400); });</script>

<div class="notfound-wrap">
  <div class="notfound-inner">
    <div class="notfound-code" aria-hidden="true">404</div>
    <span class="notfound-icon">🗺️</span>
    <h1 class="notfound-title" data-i18n="e404.title">This page doesn't exist.</h1>
    <p class="notfound-desc" data-i18n="e404.desc">
      The page you are looking for may have been moved, renamed or removed. Let's get you back on track.
    </p>
    <div class="notfound-links">
      <a href="index.html" class="btn btn-primary btn-lg" data-i18n="e404.home">Go to Homepage</a>
      <a href="blog.html" class="btn btn-secondary btn-lg" data-i18n="e404.blog">Read the Blog</a>
    </div>
    <div class="notfound-pages">
      <a href="volunteer.html" class="notfound-page-link">
        <span class="icon">🙋</span>
        <span data-i18n="nav.join">Join Us</span>
      </a>
      <a href="opportunities.html" class="notfound-page-link">
        <span class="icon">🌍</span>
        <span data-i18n="nav.opportunities">Opportunities</span>
      </a>
      <a href="projects.html" class="notfound-page-link">
        <span class="icon">📋</span>
        <span data-i18n="nav.projects">Projects</span>
      </a>
      <a href="about.html" class="notfound-page-link">
        <span class="icon">👋</span>
        <span data-i18n="nav.about">About</span>
      </a>
      <a href="partnership.html" class="notfound-page-link">
        <span class="icon">🤝</span>
        <span data-i18n="nav.partnership">Partnerships</span>
      </a>
      <a href="contact.html" class="notfound-page-link">
        <span class="icon">✉️</span>
        <span data-i18n="nav.contact">Contact</span>
      </a>
    </div>
  </div>
</div>

<script type="module" src="assets/js/core/app.js"></script>
</body>
</html>
